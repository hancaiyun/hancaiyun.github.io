<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>登录 — Han Caiyun</title>
  <meta name="description" content="登录 — 个人网站示例" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23396cff'/%3E%3Ctext x='50' y='58' font-size='45' text-anchor='middle' fill='white' font-family='Arial'%3EH%3C/text%3E%3C/svg%3E" />
</head>
<body class="auth-page">
  <main class="auth-container" role="main" aria-labelledby="loginTitle">
    <div class="auth-card" role="region" aria-label="登录表单">
      <h1 id="loginTitle">登录</h1>
      <p class="muted">请输入用户名与密码以访问个人主页（演示用）。</p>

      <form id="login-form" autocomplete="on">
        <label>
          用户名
          <input id="username" name="username" type="text" placeholder="admin" required />
        </label>
        <label>
          密码
          <input id="password" name="password" type="password" placeholder="••••••••" required />
        </label>
        <div class="auth-actions">
          <button id="login-btn" class="btn" type="submit">登录</button>
          <button id="clear-btn" class="btn btn-alt" type="button">清除</button>
        </div>

        <div id="login-msg" class="muted" aria-live="polite" style="margin-top:10px"></div>
      </form>

      <div style="margin-top:12px;font-size:13px;color:var(--muted);">
        <strong>��示：</strong>默认账号 <code>admin</code> / <code>admin</code>（仅示例）。
      </div>
    </div>

    <footer style="margin-top:18px;text-align:center;color:var(--muted);font-size:14px;">
      <a href="index.html">返回主页（需登录）</a>
    </footer>
  </main>

  <script src="auth.js"></script>
  <script>
    // 登录页逻辑：调用 auth.js 提供的接口
    (function(){
      if (window.auth && window.auth.isAuthenticated()) {
        window.location.href = 'index.html';
        return;
      }

      const form = document.getElementById('login-form');
      const msg = document.getElementById('login-msg');
      const clearBtn = document.getElementById('clear-btn');

      form.addEventListener('submit', function(e){
        e.preventDefault();
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        const ok = window.auth.login(u, p);
        if (ok) {
          msg.style.color = 'inherit';
          msg.textContent = '登录成功，正在跳转…';
          setTimeout(()=> { window.location.href = 'index.html'; }, 450);
        } else {
          msg.style.color = 'var(--accent)';
          msg.textContent = '登录失败：用户名或密码错误';
        }
      });

      clearBtn.addEventListener('click', function(){
        form.reset();
        msg.textContent = '';
      });

      document.getElementById('username').focus();
    })();
  </script>
</body>
</html>
