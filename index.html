<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>绵绵消消乐</title>
  <meta name="description" content="一个欢快轻松的网页三消小游戏，灵感来自层叠消除玩法，打开即玩。" />
  <meta name="theme-color" content="#72c44f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero-panel">
      <div class="hero-copy">
        <p class="eyebrow">Meadow Match</p>
        <h1>绵绵消消乐</h1>
        <p class="subtitle">
          点击未被遮挡的卡牌，把三张相同图案收进收纳槽即可消除。
          节奏轻快，难度适中，适合随手来一局。
        </p>
      </div>

      <div class="status-rack">
        <div class="status-pill">
          <span>关卡</span>
          <strong id="levelLabel">普通草地</strong>
        </div>
        <div class="status-pill">
          <span>剩余卡牌</span>
          <strong id="remainingCount">0</strong>
        </div>
        <div class="status-pill">
          <span>最佳连消</span>
          <strong id="comboCount">0</strong>
        </div>
      </div>
    </section>

    <section class="game-panel" aria-label="三消游戏区域">
      <div class="playfield-wrap">
        <div class="playfield-header">
          <div>
            <h2>草地牌阵</h2>
            <p>只能点击最上层且没有被覆盖的卡牌。</p>
          </div>
          <div class="action-row">
            <button id="hintButton" class="action-button action-button-soft" type="button">提示</button>
            <button id="restartButton" class="action-button" type="button">重新开局</button>
          </div>
        </div>

        <div class="playfield-stage">
          <div class="cloud cloud-left"></div>
          <div class="cloud cloud-right"></div>
          <div class="board" id="board" aria-live="polite"></div>
        </div>
      </div>

      <aside class="sidebar">
        <section class="card info-card">
          <h2>玩法说明</h2>
          <ul class="rule-list">
            <li>卡槽最多容纳 7 张卡牌。</li>
            <li>凑齐 3 张相同图案会自动消除。</li>
            <li>卡槽放满且无法继续消除时，本局失败。</li>
          </ul>
        </section>

        <section class="card info-card highlight-card">
          <h2>本局状态</h2>
          <p id="messageBox">收纳槽已经清理完毕，准备开始新的一局。</p>
        </section>

        <section class="card tray-card">
          <div class="tray-heading">
            <h2>收纳槽</h2>
            <span><strong id="trayCount">0</strong>/7</span>
          </div>
          <div class="tray" id="tray"></div>
        </section>
      </aside>
    </section>
  </main>

  <div class="overlay hidden" id="overlay" role="dialog" aria-modal="true" aria-labelledby="overlayTitle">
    <div class="overlay-card">
      <p class="overlay-kicker" id="overlayKicker">太棒了</p>
      <h2 id="overlayTitle">成功过关</h2>
      <p id="overlayText">这一局打得很顺，继续保持。</p>
      <button id="overlayButton" class="action-button" type="button">再来一局</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
