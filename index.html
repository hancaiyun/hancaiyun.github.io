<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .logout-btn { padding: 10px 15px; background-color: #007BFF; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .logout-btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎回来！</h1>
        <p>您已成功登录到个人主页。</p>
        <p>用户名：<span id="username"></span></p>
        <button class="logout-btn" onclick="logout()">登出</button>
    </div>
    <script src="auth.js"></script>
    <script>
        if (!window.auth || !window.auth.isAuthenticated()) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('username').textContent = window.auth.currentUser();
        }
        function logout() {
            window.auth.logout('login.html');
        }
    </script>
</body>
</html>
